{% extends "library/layout.html" %}

{% block title %}Home - Library Management System{% endblock %}

{% block content %}
  <h1>Welcome to the Library Management System</h1>
  <ol>
    {% for book in books %}
      <li>
        <a href="/book_items/{{ book.id }}/">
          {{ book.title }} by {{ book.author }}
        </a>
      </li>
    {% endfor %}
  </ol>
{% endblock %}
