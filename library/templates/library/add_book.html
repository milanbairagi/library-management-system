{% extends "base.html" %}

{% block title %}Add Book - Library Management System{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h1 class="mb-4">Add New Book</h1>
      
      {% if message %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endif %}

      <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        
        <div class="mb-3">
          <label for="title" class="form-label">Title:</label>
          <input type="text" id="title" name="title" class="form-control" placeholder="Enter book title..." required />
        </div>

        <div class="mb-3">
          <label for="author" class="form-label">Author:</label>
          <input type="text" id="author" name="author" class="form-control" placeholder="Enter author name..." required />
        </div>

        <div class="mb-3">
          <label for="isbn" class="form-label">ISBN:</label>
          <input type="text" id="isbn" name="isbn" class="form-control" placeholder="Enter ISBN..." required />
        </div>

        <div class="mb-3">
          <label for="publisher" class="form-label">Publisher:</label>
          <input type="text" id="publisher" name="publisher" class="form-control" placeholder="Enter publisher name..." required />
        </div>

        <div class="mb-3">
          <label for="subject" class="form-label">Subject:</label>
          <input type="text" id="subject" name="subject" class="form-control" placeholder="Enter subject..." required />
        </div>

        <button type="submit" class="btn btn-success">Add Book</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
