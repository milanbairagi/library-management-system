{% extends "library/layout.html" %}

{% block title %}Return Book - Library Management System{% endblock %}

{% block content %}
  <h1>Return Book</h1>
  {% if error %}
    <p style="color: red;">{{ error }}</p>
  {% endif %}
  {% if message %}
    <p style="color: green;">{{ message }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label for="book_item_barcode">Book Item Barcode:</label>
    <input type="text" id="book_item_barcode" name="book_item_barcode" required>
    <br><br>
    <label for="member_id">Member ID:</label>
    <input type="number" id="member_id" name="member_id" required>
    <br><br>
    <button type="submit">Return Book</button>
  </form>
{% endblock %}
