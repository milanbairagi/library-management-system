{% extends "base.html" %}

{% block title %}Return Book - Library Management System{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h1 class="mb-4">Return Book</h1>
      
      {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          {{ error }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endif %}
      
      {% if message %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endif %}

      <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        
        <div class="mb-3">
          <label for="book_item_barcode" class="form-label">Book Item Barcode:</label>
          <input type="text" id="book_item_barcode" name="book_item_barcode" class="form-control" placeholder="Enter barcode..." required>
        </div>

        <div class="mb-3">
          <label for="member_id" class="form-label">Member ID:</label>
          <input type="number" id="member_id" name="member_id" class="form-control" placeholder="Enter member ID..." required>
        </div>

        <button type="submit" class="btn btn-success">Return Book</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
