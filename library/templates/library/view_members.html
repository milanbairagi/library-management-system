{% extends "base.html" %}

{% block title %}Library Members - Library Management System{% endblock %}

{% block content %}
<div class="container mt-4">
  <h1>Library Members</h1>

  <table class="table table-striped">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
    </tr>
    {% for member in members %}
    <tr>
      <td>{{ member.id }}</td>
      <td>{{ member.name }}</td>
      <td>{{ member.email }}</td>
      <td>{{ member.phone }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
